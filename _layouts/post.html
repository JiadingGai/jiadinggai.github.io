---
layout: default
---

<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="item-meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.tags and page.tags.size > 0 %}
        &middot; {{ page.tags | join: ", " }}
      {% endif %}
    </p>
    {% if page.description %}
      <p class="lead">{{ page.description }}</p>
    {% endif %}
  </header>

  {{ content }}
</article>
