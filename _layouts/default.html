<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | capitalize }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/church-lambda-icon.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <script>
      window.MathJax = {
        tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]], displayMath: [["$$", "$$"], ["\\[", "\\]"]] },
        svg: { fontCache: "global" }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="wrapper header-wrapper">
        <div>
          <a class="brand-link" href="{{ '/' | relative_url }}">
            <img class="brand-icon" src="{{ '/assets/img/church-lambda-icon.svg' | relative_url }}" alt="" aria-hidden="true">
            <span class="site-title">{{ site.title }}</span>
          </a>
          <p class="site-tagline">{{ page.description | default: site.description }}</p>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">About</a>
          <a href="{{ '/publications/' | relative_url }}">Publications</a>
          <a href="{{ '/projects/' | relative_url }}">Projects</a>
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a href="{{ '/patents/' | relative_url }}">Patents</a>
        </nav>
      </div>
    </header>

    <main class="page-content" role="main">
      <div class="wrapper">
        {{ content }}

        <footer class="site-footer">
          <span>{{ site.title }}</span>
          <span> &middot; </span>
          <a href="https://github.com/JiadingGai">GitHub</a>
          <span> &middot; </span>
          <a href="https://scholar.google.com/citations?hl=en&user=B0OBVgsAAAAJ">Google Scholar</a>
        </footer>
      </div>
    </main>
  </body>
</html>
