<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Church lambda calculus icon</title>
  <desc id="desc">A polished lambda calculus icon inspired by Alonzo Church.</desc>
  <defs>
    <linearGradient id="ring" x1="43" y1="213" x2="213" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5b84e"/>
      <stop offset="0.46" stop-color="#ec7355"/>
      <stop offset="1" stop-color="#2c7da0"/>
    </linearGradient>
    <linearGradient id="lambda" x1="76" y1="192" x2="181" y2="59" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6c85f"/>
      <stop offset="0.52" stop-color="#e86f55"/>
      <stop offset="1" stop-color="#1f658d"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#1f2933" flood-opacity="0.16"/>
    </filter>
    <clipPath id="inner">
      <circle cx="128" cy="128" r="82"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="96" fill="none" stroke="#d8e2ec" stroke-width="21"/>
    <circle cx="128" cy="128" r="96" fill="none" stroke="url(#ring)" stroke-width="15" stroke-linecap="round"/>
  </g>

  <g clip-path="url(#inner)" opacity="0.64">
    <path d="M70 168 C94 123 113 113 131 132 C151 153 172 142 192 98" fill="none" stroke="#2c7da0" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M76 84 H181 M76 128 H181 M76 172 H181 M84 75 V181 M128 70 V186 M172 75 V181" fill="none" stroke="#cdd9e3" stroke-width="1.4"/>
    <path d="M149 96 C166 88 183 92 194 106" fill="none" stroke="#ec7355" stroke-width="3" stroke-linecap="round"/>
    <path d="M194 106 L184 103 L190 95" fill="none" stroke="#ec7355" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="88" cy="140" r="4" fill="#2c7da0"/>
    <circle cx="130" cy="132" r="4" fill="#ec7355"/>
    <circle cx="174" cy="137" r="4" fill="#f5b84e"/>
    <text x="70" y="80" fill="#245f84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="650">λx.x</text>
    <text x="145" y="118" fill="#245f84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="650">β</text>
    <text x="87" y="202" fill="#245f84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="650">λf.λx.f(f x)</text>
  </g>

  <g filter="url(#shadow)">
    <text x="128" y="181" text-anchor="middle" fill="none" stroke="#ffffff" stroke-width="18" stroke-linejoin="round" font-family="Georgia, Times New Roman, serif" font-size="154" font-style="italic" font-weight="700">λ</text>
    <text x="128" y="181" text-anchor="middle" fill="url(#lambda)" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" font-family="Georgia, Times New Roman, serif" font-size="154" font-style="italic" font-weight="700">λ</text>
  </g>
</svg>
